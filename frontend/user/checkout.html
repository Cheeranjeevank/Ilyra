<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">ILYRA</div>
</nav>

<main class="container" style="margin-top: 120px; max-width: 900px;">
  <div style="display: flex; gap: 3rem; flex-wrap: wrap;">
    
    <!-- SHIPPING FORM -->
    <div style="flex: 1.5; min-width: 300px;">
      <h1 class="mb-4">Shipping Information</h1>
      <div class="card">
        <form id="checkoutForm">
          <div class="mb-4">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
          </div>
          <div class="mb-4">
            <label>Shipping Address</label>
            <input type="text" id="address" placeholder="123 Street Name" required>
          </div>
          <div style="display: flex; gap: 1rem;" class="mb-4">
            <div style="flex: 1;">
              <label>City</label>
              <input type="text" id="city" placeholder="City" required>
            </div>
            <div style="flex: 1;">
              <label>Pincode</label>
              <input type="text" id="pincode" placeholder="123456" required>
            </div>
          </div>
          <div class="mb-4">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 0000000000" required>
          </div>
        </form>
      </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div style="flex: 1; min-width: 300px;">
      <h2 class="mb-4">Order Summary</h2>
      <div class="card">
        <div id="summaryItems" style="margin-bottom: 2rem;">
          <!-- Summary items will be loaded here -->
        </div>
        
        <div id="deliveryEstimate" style="background: var(--surface-hover); padding: 0.75rem; border-radius: var(--border-radius-sm); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
          <span style="font-size: 1.25rem;">🚚</span>
          <div>
            <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0;">Guaranteed Delivery By</p>
            <p id="checkoutDeliveryDate" style="font-size: 0.875rem; font-weight: 700; color: #10b981; margin: 0;">...</p>
          </div>
        </div>
        
        <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span style="color: var(--text-secondary);">Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span style="color: var(--text-secondary);">Shipping</span>
            <span style="color: #10b981; font-weight: 500;">FREE</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border-color);">
            <span style="font-weight: 700; font-size: 1.25rem;">Total</span>
            <span id="total" style="font-weight: 700; font-size: 1.25rem;">₹0</span>
          </div>
        </div>

        <button class="btn mt-4" onclick="placeOrder()">Pay and Place Order</button>
        <p class="text-center mt-4" style="font-size: 0.75rem; color: var(--text-muted);">
          Secure payment powered by Razor Pay.
        </p>
      </div>
    </div>

  </div>
</main>

<script src="../js/app.js?v=2"></script>

<script>
let cart = [];
let totalAmount = 0;

function loadSummary() {
  cart = JSON.parse(localStorage.getItem("checkoutItems")) || [];
  if (cart.length === 0) {
    window.location.href = "cart.html";
    return;
  }

  const container = document.getElementById("summaryItems");
  let total = 0;

  container.innerHTML = cart.map(item => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal;
    return `
      <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
        <img src="${item.image}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
        <div style="flex: 1;">
          <p style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem;">${item.name}</p>
          <p style="font-size: 0.75rem; color: var(--text-muted);">Qty: ${item.quantity}</p>
        </div>
        <p style="font-size: 0.875rem; font-weight: 600;">₹${itemTotal}</p>
      </div>
    `;
  }).join("");

  totalAmount = total;
  document.getElementById("subtotal").innerText = "₹" + total;
  document.getElementById("total").innerText = "₹" + total;
  
  // Prefill address if exists
  const saved = JSON.parse(localStorage.getItem("shipping"));
  if (saved) {
    document.getElementById("email").value = saved.email || "";
    document.getElementById("name").value = saved.name || "";
    document.getElementById("address").value = saved.address || "";
    document.getElementById("city").value = saved.city || "";
    document.getElementById("pincode").value = saved.pincode || "";
    document.getElementById("phone").value = saved.phone || "";
  }

  // Calculate Delivery Date (4 days for standard shipping)
  const delivery = new Date();
  delivery.setDate(delivery.getDate() + 4);
  const options = { weekday: 'long', month: 'short', day: 'numeric' };
  document.getElementById("checkoutDeliveryDate").innerText = delivery.toLocaleDateString('en-US', options);
}

async function placeOrder() {
  const addressData = {
    email: document.getElementById("email").value,
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    city: document.getElementById("city").value,
    pincode: document.getElementById("pincode").value,
    phone: document.getElementById("phone").value
  };

  if (Object.values(addressData).some(v => !v)) {
    alert("Please fill in all shipping details.");
    return;
  }

  const token = localStorage.getItem("token");
  if (!token) {
    alert("Please login to place an order.");
    window.location.href = "../login.html";
    return;
  }

  try {
    // 1️⃣ Fetch Razorpay Key
    const keyRes = await fetch(`${CONFIG.API_URL}/api/payment/key`);
    const keyData = await keyRes.json();
    const rzpKey = keyData.key;

    // 2️⃣ Create Order via Backend
    const orderRes = await fetch(`${CONFIG.API_URL}/api/payment/create-order`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": token },
      body: JSON.stringify({ items: cart })
    });
    const orderData = await orderRes.json();

    if (orderData.id && orderData.id.startsWith("sim_order_")) {
      // 🟩 SIMULATED DEV MODE (No Real Keys)
      console.log("Simulated payment success for dev mode");
      await submitFinalOrder("sim_payment_" + Date.now(), orderData.id);
      return;
    }

    // 🟦 REAL RAZORPAY MODAL
    const options = {
      key: rzpKey,
      amount: totalAmount * 100,
      currency: "INR",
      name: "ILYRA",
      description: "Premium Purchase",
      order_id: orderData.id,
      prefill: {
        name: addressData.name,
        email: addressData.email,
        contact: addressData.phone
      },
      handler: async function (response) {
        console.log("Payment Successful:", response);
        await submitFinalOrder(response.razorpay_payment_id, response.razorpay_order_id, response.razorpay_signature);
      },
      theme: { color: "#4f46e5" }
    };
    
    const rzp = new Razorpay(options);
    rzp.open();

  } catch (err) {
    console.error("Checkout Error:", err);
    alert("Unable to initiate checkout. Please try again.");
  }

  async function submitFinalOrder(paymentId, razorpayOrderId, razorpaySignature = null) {
    try {
      const res = await fetch(`${CONFIG.API_URL}/api/orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": token },
        body: JSON.stringify({
          items: cart,
          address: addressData,
          status: "placed",
          payment_id: paymentId,
          razorpay_order_id: razorpayOrderId,
          razorpay_signature: razorpaySignature
        })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.removeItem("cart");
        localStorage.removeItem("checkoutItems");
        window.location.href = `success.html?id=${data.orderId}`;
      } else {
        alert("Payment successful but failed to record order. Please contact support.");
      }
    } catch(err) {
      console.error(err);
      alert("Error recording order.");
    }
  }
}

loadSummary();
</script>

</body>
</html>
