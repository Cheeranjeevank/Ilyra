<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">ILYRA</div>
  <div class="nav-right">
    <span class="nav-link" onclick="location.href='index.html'">Products</span>
    <span class="nav-link" onclick="location.href='order.html'">My Orders</span>
    <div class="cart" onclick="location.href='cart.html'">
      🛒<span id="cartCount">0</span>
    </div>
  </div>
</nav>

<main class="container" style="margin-top: 120px; max-width: 800px;">
  <div class="text-center mb-4">
    <h1>Your Orders</h1>
    <p>Track and manage your premium purchases.</p>
  </div>

  <div id="ordersList">
    <!-- Orders will be loaded here -->
    <div class="text-center card" style="padding: 4rem;">
        <p>Loading your order history...</p>
    </div>
  </div>
  
  <div class="mt-4 text-center">
    <button class="btn btn-secondary" style="width: auto;" onclick="location.href='index.html'">Continue Shopping</button>
  </div>
</main>

<script src="../js/app.js?v=2"></script>

<script>
async function loadOrders() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "../login.html";
    return;
  }

  try {
    const res = await fetch(`${CONFIG.API_URL}/api/orders/my`, {
      headers: { "Authorization": token }
    });
    const orders = await res.json();
    const container = document.getElementById("ordersList");

    if (orders.length === 0) {
      container.innerHTML = `
        <div class="card text-center" style="padding: 4rem;">
          <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">You haven't placed any orders yet.</p>
          <button class="btn" style="width: auto;" onclick="location.href='index.html'">Explore Products</button>
        </div>
      `;
      return;
    }

    container.innerHTML = orders.map(o => `
      <div class="card fade-in mb-4">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
          <div>
            <p style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Order ID</p>
            <p style="font-weight: 600;">#${String(o.id).slice(0, 8)}</p>
          </div>
          <div style="text-align: right;">
            <p style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Date Placed</p>
            <p style="font-weight: 600;">${new Date(o.date || o.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}</p>
          </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <p style="color: var(--text-secondary);">Total Amount</p>
            <p style="font-size: 1.25rem; font-weight: 700; color: var(--accent-color);">₹${o.total}</p>
          </div>
          <div style="text-align: right;">
             <span style="display: inline-block; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.875rem; font-weight: 600; 
                   background: ${o.status === 'Delivered' ? '#dcfce7' : '#fef9c3'}; 
                   color: ${o.status === 'Delivered' ? '#166534' : '#854d0e'};">
               ${o.status}
             </span>
          </div>
        </div>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    document.getElementById("ordersList").innerHTML = "<div class='card text-center'><p>Error loading orders. Please try again later.</p></div>";
  }
}

loadOrders();
</script>

</body>
</html>
