<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .variant-selector {
    margin-bottom: 2rem;
  }
  .variant-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .size-chips {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .size-chip {
    padding: 0.6rem 1.25rem;
    border: 2px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    cursor: pointer;
    font-weight: 600;
    transition: var(--transition);
    background: var(--surface-color);
    color: var(--text-primary);
  }
  .size-chip:hover {
    border-color: var(--accent-color);
  }
  .size-chip.active {
    background: var(--accent-color);
    border-color: var(--accent-color);
    color: white;
    box-shadow: var(--shadow-md);
  }
  .color-swatches {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .swatch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }
  .swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid var(--surface-color);
    box-shadow: 0 0 0 1px var(--border-color);
    transition: var(--transition);
    position: relative;
  }
  .swatch-container:hover .swatch {
    transform: scale(1.1);
  }
  .swatch-container.active .swatch {
    box-shadow: 0 0 0 2px var(--accent-color);
    transform: scale(1.1);
  }
  .swatch-name {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    transition: var(--transition);
  }
  .swatch-container.active .swatch-name {
    color: var(--accent-color);
    font-weight: 700;
  }
  .quantity-input {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface-hover);
    padding: 0.5rem;
    border-radius: var(--border-radius-sm);
    width: fit-content;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    border: none;
    background: var(--surface-color);
    color: var(--text-primary);
    cursor: pointer;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  .qty-btn:hover {
    background: var(--accent-color);
    color: white;
  }
  #qtyDisplay {
    font-weight: 700;
    min-width: 30px;
    text-align: center;
  }
  .amazon-alert {
    background: #fff4e5;
    border: 1px solid #ffa117;
    color: #854d0e;
    padding: 0.75rem;
    border-radius: var(--border-radius-sm);
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .delivery-badge {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .countdown-timer {
    color: #b12704;
    font-weight: 700;
  }
  .review-card {
    background: var(--surface-color);
    padding: 1.5rem;
    border-radius: var(--border-radius-md);
    border: 1px solid var(--border-color);
    margin-bottom: 1rem;
  }
  .stars {
    color: #ffa41c;
    margin-bottom: 0.5rem;
  }
  .verified-badge {
    color: #c45500;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
  }
</style>
</head>

<body>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo" onclick="location.href='index.html'">ILYRA</div>
  <div class="nav-right">
    <span class="nav-link" onclick="location.href='index.html'">Products</span>
    <span class="nav-link" onclick="location.href='order.html'">My Orders</span>
    <div class="cart" onclick="location.href='cart.html'">
      🛒<span id="cartCount">0</span>
    </div>
  </div>
</nav>

<!-- PRODUCT -->
<main class="container" style="margin-top: 120px;">
  <div id="productDetails" class="fade-in">
    <!-- Product details will be loaded here -->
    <div class="text-center" style="padding: 4rem;">
        <p>Loading product details...</p>
    </div>
  </div>
  
  <section id="related" style="margin-top: 4rem;">
    <h2 class="mb-4">Related Products</h2>
    <div class="products" id="relatedProducts"></div>
  </section>
</main>

<!-- SIZE CHART MODAL -->
<div id="sizeChartModal" class="modal" style="
  display: none; position: fixed; z-index: 10002; left: 0; top: 0; width: 100%; height: 100%; 
  overflow: auto; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
  align-items: center; justify-content: center;
">
  <div class="card glass" style="
    max-width: 600px; width: 90%; margin: auto; padding: 2rem; position: relative; 
    border-radius: var(--border-radius-lg); text-align: center; background: var(--surface-color);
    border: 1px solid var(--border-color);
  ">
    <button onclick="closeSizeChartModal()" style="
      position: absolute; top: 1rem; right: 1rem; background: none; border: none; 
      font-size: 1.5rem; color: var(--text-primary); cursor: pointer;
    ">×</button>
    <h2 style="margin-bottom: 1.5rem;">Size Chart</h2>
    <img id="sizeChartModalImg" style="width: 100%; border-radius: var(--border-radius-sm); margin-bottom: 1rem;" src="">
  </div>
</div>

<script src="../js/app.js?v=2"></script>

<script>
const params = new URLSearchParams(window.location.search);
let id = params.get("id");
if (id) {
  localStorage.setItem("selectedProductId", id);
} else {
  id = localStorage.getItem("selectedProductId");
}
let currentProduct = null;
let selectedSize = null;
let selectedColor = null;
let selectedVariantImage = null;
let selectedQuantity = 1;
let selectedPrice = null;
let customDesignBase64 = null;

async function loadProduct() {
  if (!id) {
    document.getElementById("productDetails").innerHTML = "<h2>Product not found</h2>";
    return;
  }

  try {
    const productsData = await fetchProducts();
    const product = productsData.find(p => String(p.id) === String(id));
    currentProduct = product;

    if (product) {
      let sizeVariants = [];
      try {
        sizeVariants = Array.isArray(product.size_prices) && product.size_prices.length > 0 
          ? product.size_prices 
          : (product.sizes || "S,M,L,XL").split(",").map(s => ({ size: s.trim(), price: null, original_price: null })).filter(s => s.size);
      } catch(e) { 
        sizeVariants = [{ size: "M", price: null, original_price: null }]; 
      }

      let colors = [];
      try {
        colors = Array.isArray(product.variants) && product.variants.length > 0 
          ? product.variants 
          : JSON.parse(product.colors || "[]");
      } catch(e) { colors = []; }

      // Set defaults
      selectedSize = sizeVariants[0]?.size || "M";
      selectedPrice = sizeVariants[0]?.price || product.price;
      const initialOriginalPrice = sizeVariants[0]?.original_price || product.original_price;

      let initialImages = [];
      if (colors.length > 0) {
        selectedColor = colors[0].color || colors[0].name;
        if (Array.isArray(colors[0].images) && colors[0].images.length > 0) {
          initialImages = colors[0].images;
        } else if (colors[0].image) {
          initialImages = [colors[0].image];
        } else {
          initialImages = [product.image];
        }
        selectedVariantImage = initialImages[0] || product.image;
      } else {
        selectedColor = "Standard";
        initialImages = [product.image];
        selectedVariantImage = product.image;
      }

      const catLower = (product.category || "").toLowerCase();
      const nameLower = (product.name || "").toLowerCase();
      const isCustomizable = product.is_customizable === true || 
                             catLower.includes("custom") || 
                             nameLower.includes("custom") || 
                             catLower.includes("personal") || 
                             nameLower.includes("personal");
      const showUploadBox = isCustomizable;

      document.getElementById("productDetails").innerHTML = `
        <div class="product-split" style="display:flex; gap:4rem; flex-wrap:wrap; align-items: flex-start;">
          <div class="product-image-col" style="flex: 1; min-width: 300px;">
            <div class="card" style="padding: 0; overflow: hidden; border-radius: var(--border-radius-lg); position: sticky; top: 120px;">
              <div style="position: relative; width: 100%; display: block;">
                <img id="mainImg" src="${selectedVariantImage || product.image || 'https://via.placeholder.com/600'}" 
                     style="width: 100%; display: block; transition: var(--transition);">
                <div id="mockupOverlay" style="
                  position: absolute; 
                  top: 50%; 
                  left: 50%; 
                  transform: translate(-50%, -50%); 
                  width: 32%; 
                  height: 32%; 
                  pointer-events: none; 
                  display: none; 
                  align-items: center; 
                  justify-content: center;
                  overflow: hidden;
                  opacity: 0.85;
                ">
                  <img id="mockupDesign" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>
              </div>
            </div>
            <div id="imageGallery" style="display:flex; gap:1rem; margin-top:1.5rem; flex-wrap: wrap;">
              ${initialImages.map(img => `
                <div class="card" style="padding: 0.5rem; width: 80px; cursor: pointer;" onclick="updateMainImage('${img}')">
                  <img src="${img}" style="width: 100%; border-radius: var(--border-radius-sm);">
                </div>
              `).join("")}
            </div>
          </div>

          <div class="product-info-col" style="flex: 1; min-width: 400px;">
            <span style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; font-weight: 700; color: var(--accent-color); margin-bottom: 0.5rem; display: block;">
              ${product.category || 'Collection'}
            </span>
            <h1 style="font-size: 3rem; margin-bottom: 0.75rem; line-height: 1.1;">${product.name}</h1>
            <div style="display: flex; gap: 1rem; align-items: baseline; margin-bottom: 2rem;">
              <p id="displayPrice" style="font-size: 1.75rem; font-weight: 700; color: var(--text-primary);">₹${selectedPrice}</p>
              ${initialOriginalPrice ? `<p id="displayOriginalPrice" style="font-size: 1.25rem; font-weight: 500; color: var(--text-muted); text-decoration: line-through;">MRP: ₹${initialOriginalPrice}</p>` : `<p id="displayOriginalPrice" style="font-size: 1.25rem; font-weight: 500; color: var(--text-muted); text-decoration: line-through; display: none;"></p>`}
            </div>
            
            <p style="margin-bottom: 2.5rem; color: var(--text-secondary); line-height: 1.8; font-size: 1.1rem;">
              ${product.description || 'Experience the perfect blend of style and comfort with this premium ILYRA product. Designed for the modern individual who values quality and minimalism.'}
            </p>

            ${product.stock > 0 && product.stock < 20 ? `
              <div class="amazon-alert">
                <span>⚠️</span> Only ${product.stock} left in stock - order soon.
              </div>
            ` : ''}

            <div class="delivery-badge" id="deliveryInfo">
              Get it by <strong id="deliveryDate" style="color: var(--text-primary);">...</strong><br>
              Order within <span class="countdown-timer" id="countdown">...</span>
            </div>

            <!-- COLOR SELECTOR -->
            ${colors.length > 0 ? `
              <div class="variant-selector">
                <label class="variant-label">Color: <span id="colorNameDisplay" style="color: var(--text-primary);">${selectedColor}</span></label>
                <div class="color-swatches">
                  ${colors.map((c, index) => {
                    const swatchImg = (Array.isArray(c.images) && c.images.length > 0) ? c.images[0] : c.image;
                    return `
                      <div class="swatch-container ${index === 0 ? 'active' : ''}" 
                           onclick="selectColor('${c.color || c.name}', this)">
                        ${swatchImg 
                          ? `<img src="${swatchImg}" class="swatch" style="object-fit: cover;">`
                          : `<div class="swatch" style="background: ${c.hex || '#ccc'};"></div>`
                        }
                        <span class="swatch-name">${c.color || c.name}</span>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            ` : ''}

            <!-- SIZE SELECTOR -->
            <div class="variant-selector">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <label class="variant-label" style="margin-bottom: 0;">Select Size</label>
                <span id="sizeChartLink" style="font-size: 0.85rem; color: var(--accent-color); cursor: pointer; font-weight: 600; text-decoration: underline; display: none;" onclick="openSizeChartModal()">Size Chart</span>
              </div>
              <div class="size-chips">
                ${sizeVariants.map((sv, index) => `
                  <div class="size-chip ${index === 0 ? 'active' : ''}" onclick="selectSize('${sv.size}', ${sv.price || 'null'}, ${sv.original_price || 'null'}, this)">${sv.size}</div>
                `).join("")}
              </div>
            </div>

            <!-- CUSTOM DESIGN UPLOAD -->
            ${showUploadBox ? `
              <div class="variant-selector" style="background: rgba(79, 70, 229, 0.05); padding: 1.5rem; border-radius: var(--border-radius-md); border: 1px dashed var(--accent-color); margin-bottom: 2rem;">
                <label class="variant-label" style="color: var(--accent-color); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                  <span>✨</span> Customize Your Product / Upload Photo
                </label>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">Upload your photo, logo, or design to print on this item. Preview it live on the product!</p>
                <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                  <button class="btn btn-secondary" onclick="document.getElementById('customDesignInput').click()" style="width: 100%; height: 48px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-weight: 700;">
                    <span>📤</span> Upload Design Photo
                  </button>
                  <input type="file" id="customDesignInput" accept="image/*" style="display: none;" onchange="handleDesignUpload(this)">
                  
                  <div id="designPreviewContainer" style="display: none; align-items: center; gap: 1rem; width: 100%; background: var(--surface-color); padding: 0.75rem; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color);">
                    <img id="designPreviewImg" style="width: 50px; height: 50px; object-fit: cover; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color);">
                    <div style="flex: 1; overflow: hidden;">
                      <p style="font-size: 0.8rem; font-weight: 700; margin: 0; white-space: nowrap; text-overflow: ellipsis; color: var(--text-primary);" id="designFileName">design.png</p>
                      <p style="font-size: 0.7rem; color: var(--text-muted); margin: 0;">Ready to print</p>
                    </div>
                    <button onclick="removeUploadedDesign()" style="background: none; border: none; color: #ef4444; font-size: 1.25rem; cursor: pointer; padding: 0 0.5rem; line-height: 1;">×</button>
                  </div>
                </div>
              </div>
            ` : ''}

            <div class="variant-selector">
              <label class="variant-label">Quantity</label>
              <div class="quantity-input">
                <button class="qty-btn" onclick="updateQuantity(-1)">-</button>
                <span id="qtyDisplay">1</span>
                <button class="qty-btn" onclick="updateQuantity(1)">+</button>
              </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 3rem;">
              ${product.stock === 0 ? `
                <button class="btn" style="background: var(--text-muted); cursor: not-allowed; flex: 2;" disabled>
                  Out of Stock
                </button>
              ` : `
                <button class="btn" style="flex: 2; height: 60px; font-size: 1.1rem;" onclick="handleAddToCart()">
                  Add to Cart
                </button>
              `}
              <button class="btn btn-secondary" style="flex: 1; height: 60px;" onclick="addToWishlist()">
                ♡
              </button>
            </div>
            
            <div class="reviews-split" style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div>
                <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem;">Availability</p>
                <p style="font-weight: 600; font-size: 0.9rem;">${product.stock > 0 ? 'In Stock' : 'Out of Stock'}</p>
              </div>
              <div>
                <p style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.25rem;">Free Shipping</p>
                <p style="font-weight: 600; font-size: 0.9rem;">On orders over ₹999</p>
              </div>
            </div>

            <div style="margin-top: 2rem; display: flex; gap: 2rem; opacity: 0.7;">
              <div style="text-align: center;">
                <span style="font-size: 1.5rem;">🔒</span>
                <p style="font-size: 0.7rem; font-weight: 600; margin-top: 0.25rem;">SECURE<br>PAYMENT</p>
              </div>
              <div style="text-align: center;">
                <span style="font-size: 1.5rem;">🚚</span>
                <p style="font-size: 0.7rem; font-weight: 600; margin-top: 0.25rem;">FAST<br>DELIVERY</p>
              </div>
              <div style="text-align: center;">
                <span style="font-size: 1.5rem;">♻️</span>
                <p style="font-size: 0.7rem; font-weight: 600; margin-top: 0.25rem;">ECO<br>FRIENDLY</p>
              </div>
            </div>
          </div>
        </div>

        <section style="margin-top: 6rem; border-top: 1px solid var(--border-color); padding-top: 4rem;">
          <h2 class="mb-4">Customer Reviews</h2>
          <div class="reviews-split" style="display: grid; grid-template-columns: 1fr 2fr; gap: 4rem;">
            <div>
              <div style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem;">4.8 <span style="font-size: 1.5rem; color: var(--text-muted);">/ 5</span></div>
              <div class="stars" style="font-size: 1.5rem;">★★★★★</div>
              <p style="font-size: 0.875rem; color: var(--text-muted);">Based on 124 verified reviews</p>
              
              <div style="margin-top: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                  <span style="font-size: 0.875rem; min-width: 40px;">5 Star</span>
                  <div style="flex: 1; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden;">
                    <div style="width: 85%; height: 100%; background: #ffa41c;"></div>
                  </div>
                  <span style="font-size: 0.875rem; width: 30px;">85%</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                  <span style="font-size: 0.875rem; min-width: 40px;">4 Star</span>
                  <div style="flex: 1; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden;">
                    <div style="width: 10%; height: 100%; background: #ffa41c;"></div>
                  </div>
                  <span style="font-size: 0.875rem; width: 30px;">10%</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                  <span style="font-size: 0.875rem; min-width: 40px;">3 Star</span>
                  <div style="flex: 1; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden;">
                    <div style="width: 5%; height: 100%; background: #ffa41c;"></div>
                  </div>
                  <span style="font-size: 0.875rem; width: 30px;">5%</span>
                </div>
              </div>
            </div>

            <div>
              <div class="review-card">
                <div class="stars">★★★★★</div>
                <p style="font-weight: 700; margin-bottom: 0.5rem;">Absolutely incredible quality!</p>
                <p style="font-size: 0.875rem; margin-bottom: 1rem;">"The attention to detail and the fit of this product exceeded all my expectations. It feels premium and looks stunning in person. Definitely worth every penny."</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="font-size: 0.875rem; font-weight: 600;">Arjun K.</span>
                  <span class="verified-badge">✓ Verified Purchase</span>
                </div>
              </div>
              <div class="review-card">
                <div class="stars">★★★★★</div>
                <p style="font-weight: 700; margin-bottom: 0.5rem;">Perfect minimalist aesthetic</p>
                <p style="font-size: 0.875rem; margin-bottom: 1rem;">"Fast delivery and the packaging was super premium. The color is exactly like the photos. Will be ordering more from ILYRA soon!"</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span style="font-size: 0.875rem; font-weight: 600;">Sarah M.</span>
                  <span class="verified-badge">✓ Verified Purchase</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      `;
      loadRelated(product.id, productsData);
      startCountdown();

      // Fetch size chart setting
      try {
        const settingsRes = await fetch(`${CONFIG.API_URL}/api/settings/size_chart`);
        const settingsData = await settingsRes.json();
        if (settingsData && settingsData.value) {
          const sizeChartLink = document.getElementById("sizeChartLink");
          if (sizeChartLink) {
            sizeChartLink.style.display = "inline";
            document.getElementById("sizeChartModalImg").src = settingsData.value;
          }
        }
      } catch(e) {
        console.error("Failed to load size chart", e);
      }
    } else {
      document.getElementById("productDetails").innerHTML = "<h2>Product not found</h2>";
    }
  } catch (err) {
    console.error(err);
    document.getElementById("productDetails").innerHTML = "<h2>Error loading product</h2>";
  }
}

function startCountdown() {
  const deliveryDateEl = document.getElementById('deliveryDate');
  const countdownEl = document.getElementById('countdown');
  
  if (!deliveryDateEl || !countdownEl) return;

  // Set Delivery Date (3 days from now)
  const delivery = new Date();
  delivery.setDate(delivery.getDate() + 3);
  const options = { weekday: 'long', month: 'short', day: 'numeric' };
  deliveryDateEl.innerText = delivery.toLocaleDateString('en-US', options);

  // Countdown to midnight for "Tomorrow Delivery"
  function updateTimer() {
    const now = new Date();
    const tonight = new Date();
    tonight.setHours(24, 0, 0, 0);
    
    const diff = tonight - now;
    const hours = Math.floor(diff / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((diff % (1000 * 60)) / 1000);
    
    countdownEl.innerText = `${hours}h ${mins}m ${secs}s`;
  }

  updateTimer();
  setInterval(updateTimer, 1000);
}

function updateMainImage(src) {
  const mainImg = document.getElementById('mainImg');
  mainImg.style.opacity = '0';
  setTimeout(() => {
    mainImg.src = src;
    mainImg.style.opacity = '1';
  }, 200);
}

function selectSize(size, overridePrice, overrideOriginalPrice, el) {
  selectedSize = size;
  selectedPrice = overridePrice || currentProduct.price;
  
  document.getElementById('displayPrice').innerText = '₹' + selectedPrice;
  const origPriceEl = document.getElementById('displayOriginalPrice');
  const origPrice = overrideOriginalPrice || currentProduct.original_price;
  if (origPrice) {
    origPriceEl.innerText = 'MRP: ₹' + origPrice;
    origPriceEl.style.display = 'block';
  } else {
    origPriceEl.style.display = 'none';
  }

  document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function selectColor(colorName, el) {
  selectedColor = colorName;
  const colorObj = currentProduct.variants.find(v => (v.color || v.name) === colorName);
  let imagesToShow = [];
  if (colorObj && Array.isArray(colorObj.images) && colorObj.images.length > 0) {
    imagesToShow = colorObj.images;
  } else if (colorObj && colorObj.image) {
    imagesToShow = [colorObj.image];
  } else {
    imagesToShow = [currentProduct.image];
  }
  
  selectedVariantImage = imagesToShow[0] || currentProduct.image;
  document.getElementById('colorNameDisplay').innerText = colorName;
  document.querySelectorAll('.swatch-container').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  
  if (selectedVariantImage) updateMainImage(selectedVariantImage);

  // Update Image Gallery thumbnails
  const galleryEl = document.getElementById('imageGallery');
  if (galleryEl) {
    galleryEl.innerHTML = imagesToShow.map(img => `
      <div class="card" style="padding: 0.5rem; width: 80px; cursor: pointer;" onclick="updateMainImage('${img}')">
        <img src="${img}" style="width: 100%; border-radius: var(--border-radius-sm);">
      </div>
    `).join("");
  }
}

function openSizeChartModal() {
  const modal = document.getElementById('sizeChartModal');
  if (modal) modal.style.display = 'flex';
}

function closeSizeChartModal() {
  const modal = document.getElementById('sizeChartModal');
  if (modal) modal.style.display = 'none';
}

function updateQuantity(change) {
  selectedQuantity = Math.max(1, selectedQuantity + change);
  document.getElementById('qtyDisplay').innerText = selectedQuantity;
}

function handleAddToCart() {
  if(!currentProduct) return;
  
  const catLower = (currentProduct.category || "").toLowerCase();
  const nameLower = (currentProduct.name || "").toLowerCase();
  const isCustomizable = currentProduct.is_customizable === true || catLower.includes("custom") || nameLower.includes("custom");

  if (isCustomizable && !customDesignBase64) {
    alert("Please upload your design or photo first to customize this T-shirt.");
    return;
  }
  
  for(let i=0; i < selectedQuantity; i++) {
    addToCart(currentProduct, selectedSize, selectedColor, selectedVariantImage, selectedPrice, customDesignBase64);
  }
  
  showToast("Added to cart!");
  updateCartCount();
}

function handleDesignUpload(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById("designFileName").innerText = file.name;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxWidth = 800;
      const maxHeight = 800;
      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
      } else {
        if (height > maxHeight) {
          width = Math.round(width * (maxHeight / height));
          height = maxHeight;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      const base64Str = canvas.toDataURL('image/jpeg', 0.8);
      customDesignBase64 = base64Str;

      // Update previews
      document.getElementById("designPreviewImg").src = base64Str;
      document.getElementById("designPreviewContainer").style.display = "flex";
      
      const mockupOverlay = document.getElementById("mockupOverlay");
      const mockupDesign = document.getElementById("mockupDesign");
      if (mockupOverlay && mockupDesign) {
        mockupDesign.src = base64Str;
        mockupOverlay.style.display = "flex";
      }
      
      showToast("Design uploaded successfully!");
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeUploadedDesign() {
  customDesignBase64 = null;
  document.getElementById("customDesignInput").value = "";
  document.getElementById("designPreviewContainer").style.display = "none";
  
  const mockupOverlay = document.getElementById("mockupOverlay");
  const mockupDesign = document.getElementById("mockupDesign");
  if (mockupOverlay && mockupDesign) {
    mockupDesign.src = "";
    mockupOverlay.style.display = "none";
  }
  
  showToast("Design removed.");
}

function addToWishlist() {
    showToast("Added to wishlist!");
}

async function loadRelated(currentId, productsData) {
  const related = productsData.filter(p => String(p.id) !== String(currentId)).slice(0, 4);
  const container = document.getElementById("relatedProducts");
  
  if (related.length === 0) {
    document.getElementById("related").style.display = "none";
    return;
  }

  container.innerHTML = related.map(p => `
    <div class="card fade-in">
      <img src="${p.image}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button class="btn btn-secondary" onclick="location.href='product.html?id=${p.id}'">View Product</button>
    </div>
  `).join("");
}

loadProduct();

  if (e.target.id === "mainImg") {
    e.target.style.transform = "scale(1.05)";
  }
});

document.addEventListener("mouseout", e => {
  if (e.target.id === "mainImg") {
    e.target.style.transform = "scale(1)";
