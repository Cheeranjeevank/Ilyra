<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Users | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.users-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

.avatar {
  width: 48px;
  height: 48px;
  background: var(--accent-color);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.25rem;
}

.role-badge {
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
}

.role-admin { background: #fee2e2; color: #991b1b; }
.role-user { background: #f1f5f9; color: #475569; }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="admin">
  <aside class="sidebar">
    <div class="logo mb-4" onclick="location.href='../user/index.html'">ILYRA</div>
    <p onclick="location.href='dashboard.html'">Dashboard</p>
    <p onclick="location.href='products.html'">Products</p>
    <p onclick="location.href='orders.html'">Orders</p>
    <p class="active" onclick="location.href='users.html'">Users</p>
  </aside>

  <main class="content">
    <header class="header mb-4">
      <div>
        <h1>User Directory</h1>
        <p style="color: var(--text-muted); font-size: 0.875rem;">Total registered members: <b id="userCount" style="color: var(--text-primary);">0</b></p>
      </div>
      <div style="display: flex; gap: 1rem; align-items: center;">
        <input id="searchUser" class="search-bar" placeholder="Search by name or email..." style="width: 250px;">
      </div>
    </header>

    <div id="usersContainer" class="users-grid">
        <p class="text-center" style="grid-column: 1/-1; padding: 4rem;">Loading users...</p>
    </div>
  </main>
</div>

<script src="../js/app.js?v=2"></script>
<script>
const userData = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");
if (!token || !userData || userData.role !== "admin") {
  window.location.href = "admin-login.html";
}

let users = [];

async function loadUsers() {
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/users`, {
      headers: { "Authorization": token }
    });
    users = await res.json();
    document.getElementById("userCount").innerText = users.length;
    renderUsers();
  } catch (err) {
    console.error(err);
    document.getElementById("usersContainer").innerHTML = "<p>Error loading users.</p>";
  }
}

function renderUsers(list = users) {
  const container = document.getElementById("usersContainer");
  if (list.length === 0) {
    container.innerHTML = "<p class='text-center' style='grid-column: 1/-1;'>No users found.</p>";
    return;
  }

  container.innerHTML = list.map(u => `
    <div class="card fade-in">
      <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
        <div class="avatar">${u.name ? u.name[0].toUpperCase() : 'U'}</div>
        <div style="flex: 1;">
          <h3 style="margin-bottom: 0.15rem;">${u.name}</h3>
          <span class="role-badge role-${u.role || 'user'}">${u.role || 'user'}</span>
        </div>
      </div>
      
      <div style="background: var(--surface-hover); padding: 1rem; border-radius: var(--border-radius-sm); margin-bottom: 1.5rem;">
        <p style="font-size: 0.875rem; color: var(--text-secondary); word-break: break-all;"><span style="font-weight: 700; color: var(--text-primary);">Email:</span> ${u.email}</p>
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem;"><span style="font-weight: 700; color: var(--text-primary);">Member Since:</span> ${new Date(u.created_at || Date.now()).toLocaleDateString()}</p>
      </div>

      <div style="display: flex; gap: 0.5rem;">
        <button class="btn btn-secondary" style="flex: 1; font-size: 0.875rem;" onclick="showToast('Feature coming soon')">View Details</button>
        <button class="btn btn-secondary" style="flex: 1; font-size: 0.875rem; border-color: #ef4444; color: #ef4444;" onclick="deleteUser('${u.id}')">Delete Account</button>
      </div>
    </div>
  `).join("");
}

document.getElementById("searchUser").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase();
  const filtered = users.filter(u => 
    u.name.toLowerCase().includes(query) || 
    u.email.toLowerCase().includes(query)
  );
  renderUsers(filtered);
});

async function deleteUser(id) {
  if (!confirm("Permanently delete this user account? This action cannot be undone.")) return;
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/users/${id}`, {
      method: "DELETE",
      headers: { "Authorization": token }
    });
    if (res.ok) {
        showToast("User account deleted.");
        loadUsers();
    }
  } catch (err) {
    console.error(err);
    showToast("Delete failed.");
  }
}


loadUsers();
</script>

</body>
</html>
