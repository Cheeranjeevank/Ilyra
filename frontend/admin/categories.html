<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Categories | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="admin">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo mb-4" onclick="location.href='../user/index.html'">ILYRA</div>
    <p onclick="location.href='dashboard.html'">Dashboard</p>
    <p class="active" onclick="location.href='categories.html'">Categories</p>
    <p onclick="location.href='products.html'">Products</p>
    <p onclick="location.href='orders.html'">Orders</p>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <header class="header mb-4">
      <div style="display: flex; align-items: center; gap: 1.5rem;">
        <h1>Category Images</h1>
      </div>
    </header>

    <!-- ADD/EDIT FORM -->
    <section class="card mb-4 fade-in">
      <h2 id="formTitle" style="margin-bottom: 1.5rem;">Set Category Image</h2>
      <div class="form-grid">
        <div>
          <label>Category Name</label>
          <input id="name" placeholder="E.g. Men's Wear">
        </div>
      </div>
      
      <div style="margin-bottom: 1.5rem;">
        <label>Cover Image (Upload)</label>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <input type="file" id="imageUpload" accept="image/*" style="flex: 1;">
          <img id="imagePreview" src="https://via.placeholder.com/150" style="width: 150px; height: 100px; object-fit: cover; border-radius: var(--border-radius-sm); border: 1px solid var(--border-color);">
        </div>
        <input type="hidden" id="imageUrl">
      </div>

      <div style="display: flex; gap: 1rem;">
        <button class="btn" onclick="saveCategory()">Save Category Image</button>
        <button class="btn btn-secondary" onclick="resetForm()">Clear</button>
      </div>
    </section>

    <!-- CATEGORIES LIST -->
    <section class="card fade-in">
      <h2>All Categories</h2>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="categoriesTable">
            <tr>
              <td colspan="3" class="text-center">Loading categories...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script>
const CONFIG = {
  API_URL: window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
    ? "http://localhost:5001" 
    : "https://ilyra.onrender.com"
};

// Check if admin is logged in
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token || role !== "admin") {
  window.location.href = "../user/login.html";
}

let allCategories = [];

// Handle Image Upload -> Base64
document.getElementById('imageUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    document.getElementById('imagePreview').src = event.target.result;
    document.getElementById('imageUrl').value = event.target.result;
  };
  reader.readAsDataURL(file);
});

async function loadCategories() {
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/categories`);
    allCategories = await res.json();
    renderTable();
  } catch (err) {
    console.error("Failed to fetch categories");
  }
}

function renderTable() {
  const tbody = document.getElementById("categoriesTable");
  
  if (allCategories.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center">No categories found</td></tr>`;
    return;
  }

  tbody.innerHTML = allCategories.map(cat => `
    <tr>
      <td><img src="${cat.image}" style="width: 80px; height: 50px; object-fit: cover; border-radius: var(--border-radius-sm);"></td>
      <td style="font-weight: 600;">${cat.name}</td>
      <td>
        <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" onclick="editCategory('${cat.name}')">Edit</button>
        <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-color: red; color: red;" onclick="deleteCategory('${cat.name}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

function editCategory(name) {
  const cat = allCategories.find(c => c.name === name);
  if (!cat) return;
  
  document.getElementById("name").value = cat.name;
  document.getElementById("imageUrl").value = cat.image;
  document.getElementById("imagePreview").src = cat.image || 'https://via.placeholder.com/150';
  document.getElementById("formTitle").innerText = "Edit Category Image";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById("name").value = "";
  document.getElementById("imageUpload").value = "";
  document.getElementById("imageUrl").value = "";
  document.getElementById("imagePreview").src = "https://via.placeholder.com/150";
  document.getElementById("formTitle").innerText = "Set Category Image";
}

async function saveCategory() {
  const name = document.getElementById("name").value.trim();
  const image = document.getElementById("imageUrl").value;

  if (!name || !image) return alert("Please provide a name and an image.");

  const payload = { name, image };

  try {
    const res = await fetch(`${CONFIG.API_URL}/api/categories`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alert("Category image saved successfully!");
      resetForm();
      loadCategories();
    } else {
      const data = await res.json();
      alert("Error: " + data.error);
    }
  } catch (err) {
    alert("Network error.");
  }
}

async function deleteCategory(name) {
  if (!confirm(`Are you sure you want to delete the image for ${name}?`)) return;

  try {
    const res = await fetch(`${CONFIG.API_URL}/api/categories/${name}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });

    if (res.ok) {
      alert("Category deleted!");
      loadCategories();
    } else {
      alert("Error deleting category");
    }
  } catch (err) {
    alert("Network error.");
  }
}

// Initial load
loadCategories();
</script>
</body>
</html>
