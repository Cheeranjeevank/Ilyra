<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Products | ILYRA</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* Dashboard-specific layout */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.live-indicator {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(16, 185, 129, 0.1);
  color: #10b981;
  padding: 0.25rem 0.75rem;
  border-radius: 50px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1px solid rgba(16, 185, 129, 0.2);
}

.dot {
  width: 8px;
  height: 8px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

.badge {
  padding: 0.25rem 0.75rem;
  border-radius: 50px;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-success { background: #dcfce7; color: #166534; }
.badge-danger { background: #fee2e2; color: #991b1b; }
.badge-warning { background: #fef9c3; color: #854d0e; }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="admin">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo mb-4" onclick="location.href='../user/index.html'">ILYRA</div>
    <p onclick="location.href='dashboard.html'">Dashboard</p>
    <p class="active" onclick="location.href='products.html'">Products</p>
    <p onclick="location.href='orders.html'">Orders</p>
    <p onclick="location.href='users.html'">Users</p>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <header class="header mb-4">
      <div style="display: flex; align-items: center; gap: 1.5rem;">
        <h1>Inventory Management</h1>
        <div class="live-indicator">
          <div class="dot"></div>
          Live Sync Active
        </div>
      </div>
      <div style="display: flex; gap: 1rem;">
      </div>
    </header>

    <!-- ADD/EDIT FORM -->
    <section class="card mb-4 fade-in">
      <h2 id="formTitle" style="margin-bottom: 1.5rem;">Add New Product</h2>
      <div class="form-grid">
        <div>
          <label>Product ID (SKU)</label>
          <input id="productId" placeholder="E.g. ILY-SHIRT-001">
        </div>
        <div>
          <label>Product Name</label>
          <input id="name" placeholder="E.g. Premium Cotton T-Shirt">
        </div>
        <div>
          <label>Price (Offer Price) (₹)</label>
          <input id="price" type="number" placeholder="999">
        </div>
        <div>
          <label>Original Price (MRP) (₹)</label>
          <input id="original_price" type="number" placeholder="1299">
        </div>
        <div>
          <label>Category</label>
          <input id="category" placeholder="Apparel">
        </div>
        <div>
          <label>Stock Quantity</label>
          <input id="stock" type="number" placeholder="50">
        </div>
        <div>
          <label>Sizes (Comma separated)</label>
          <input id="sizes" placeholder="S, M, L, XL">
        </div>
        <div style="grid-column: 1 / -1;">
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="Premium quality fabric..." style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); background: var(--surface-color); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; transition: var(--transition);"></textarea>
        </div>
        <div style="grid-column: 1 / -1;">
          <label>Main Product Image</label>
          <input type="file" id="imageFile">
        </div>
        
        <!-- VARIANT MANAGER -->
        <div style="grid-column: 1 / -1; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 0.5rem;">
          <h3 style="margin-bottom: 0.5rem;">Color Variants & Images</h3>
          <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Add specific images for different colors. Customers can click the colors to switch the image.</p>
          <div id="variantsContainer" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;"></div>
          
          <div style="display: flex; gap: 1rem; align-items: flex-end; background: var(--surface-hover); padding: 1rem; border-radius: var(--border-radius-sm);">
            <div style="flex: 1;">
              <label>Color Name</label>
              <input id="newVariantColor" placeholder="E.g. Navy Blue">
            </div>
            <div style="flex: 1;">
              <label>Color Image</label>
              <input type="file" id="newVariantImage">
            </div>
            <button class="btn btn-secondary" style="width: auto;" onclick="addVariant()">Add Variant</button>
          </div>
        </div>
      </div>
      
      <div style="display: flex; gap: 1rem; align-items: center;">
        <img id="preview" style="max-height: 100px; border-radius: var(--border-radius-sm); display: none; border: 1px solid var(--border-color);">
        <button id="submitBtn" class="btn" style="width: auto;" onclick="saveProduct()">Add Product</button>
        <button id="cancelBtn" class="btn btn-secondary" style="width: auto; display: none;" onclick="cancelEdit()">Cancel Edit</button>
      </div>
    </section>

    <!-- PRODUCT LIST -->
    <section class="products" id="productList">
      <!-- Products will be rendered here -->
    </section>

    <!-- ANALYTICS -->
    <section class="card mt-4 fade-in">
      <h2 style="margin-bottom: 1.5rem;">Stock Distribution</h2>
      <div style="height: 300px; width: 100%;">
        <canvas id="productChart"></canvas>
      </div>
    </section>
  </main>
</div>

<script src="../js/app.js"></script>

<script>
if (!localStorage.getItem("token")) {
  window.location.href = "admin-login.html";
}

document.getElementById("imageFile").addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      const preview = document.getElementById("preview");
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

let products = [];
let chartInstance = null;
let editingId = null;
let currentVariants = [];

function addVariant() {
  const colorInput = document.getElementById("newVariantColor");
  const fileInput = document.getElementById("newVariantImage");
  
  if (!colorInput.value) {
    showToast("Please enter a color name");
    return;
  }
  
  const file = fileInput.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => {
      currentVariants.push({ color: colorInput.value, image: e.target.result });
      colorInput.value = "";
      fileInput.value = "";
      renderVariants();
    };
    reader.readAsDataURL(file);
  } else {
    currentVariants.push({ color: colorInput.value, image: null });
    colorInput.value = "";
    renderVariants();
  }
}

function removeVariant(index) {
  currentVariants.splice(index, 1);
  renderVariants();
}

function renderVariants() {
  const container = document.getElementById("variantsContainer");
  container.innerHTML = currentVariants.map((v, i) => `
    <div style="display: flex; align-items: center; justify-content: space-between; background: var(--surface-color); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: var(--border-radius-sm);">
      <div style="display: flex; align-items: center; gap: 1rem;">
        ${v.image ? `<img src="${v.image}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">` : `<div style="width:40px; height:40px; background:#ddd; border-radius:4px;"></div>`}
        <span style="font-weight: 600;">${v.color}</span>
      </div>
      <button class="btn btn-secondary" style="width: auto; padding: 0.25rem 0.5rem; font-size: 0.75rem; border-color: #ef4444; color: #ef4444;" onclick="removeVariant(${i})">Remove</button>
    </div>
  `).join("");
}

async function loadProducts() {
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/products`);
    products = await res.json();
    renderProducts();
    renderAnalytics();
  } catch (err) {
    console.warn("Live sync failed, retrying...");
  }
}

// Start Live Polling
setInterval(loadProducts, 5000);

function renderProducts() {
  const container = document.getElementById("productList");
  container.innerHTML = "";

  products.forEach(p => {
    const isLowStock = p.stock < 10;
    const badgeClass = p.stock === 0 ? 'badge-danger' : (isLowStock ? 'badge-warning' : 'badge-success');
    const badgeText = p.stock === 0 ? 'Out of Stock' : (isLowStock ? `Low Stock (${p.stock})` : `In Stock (${p.stock})`);

    container.innerHTML += `
      <div class="card fade-in" style="${isLowStock ? 'border-color: #f59e0b;' : ''}">
        <img src="${p.image || 'https://via.placeholder.com/200'}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p style="color: var(--accent-color); font-weight: 700;">₹${p.price}</p>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <span style="font-size: 0.75rem; color: var(--text-muted);">${p.category}</span>
        </div>
        ${p.original_price ? `<p style="color: var(--text-muted); font-size: 0.8rem; text-decoration: line-through;">MRP: ₹${p.original_price}</p>` : ''}
        
        <div style="display: flex; gap: 0.5rem; margin-top: auto;">
          <button class="btn btn-secondary" style="flex: 1; font-size: 0.875rem;" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
          <button class="btn btn-secondary" style="flex: 1; font-size: 0.875rem; border-color: #ef4444; color: #ef4444;" onclick="deleteProduct('${p.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

function editProduct(p) {
  editingId = p.id;
  document.getElementById("formTitle").innerText = "Edit Product: " + p.name;
  document.getElementById("submitBtn").innerText = "Update Product";
  document.getElementById("cancelBtn").style.display = "block";

  document.getElementById("productId").value = p.id;
  document.getElementById("productId").disabled = true; // Cannot edit the Primary Key
  document.getElementById("name").value = p.name;
  document.getElementById("price").value = p.price;
  document.getElementById("original_price").value = p.original_price || "";
  document.getElementById("description").value = p.description || "";
  document.getElementById("category").value = p.category || "";
  document.getElementById("stock").value = p.stock || 0;
  document.getElementById("sizes").value = p.sizes || "";
  
  currentVariants = Array.isArray(p.variants) ? [...p.variants] : [];
  renderVariants();
  
  const preview = document.getElementById("preview");
  preview.src = p.image;
  preview.style.display = "block";

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  document.getElementById("formTitle").innerText = "Add New Product";
  document.getElementById("submitBtn").innerText = "Add Product";
  document.getElementById("cancelBtn").style.display = "none";

  document.getElementById("productId").value = "";
  document.getElementById("productId").disabled = false;
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("original_price").value = "";
  document.getElementById("description").value = "";
  document.getElementById("category").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("sizes").value = "";
  document.getElementById("imageFile").value = "";
  document.getElementById("preview").style.display = "none";
  currentVariants = [];
  renderVariants();
}

async function saveProduct() {
  const token = localStorage.getItem("token");
  const productId = document.getElementById("productId").value;
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const original_price = document.getElementById("original_price").value;
  const description = document.getElementById("description").value;
  const stock = document.getElementById("stock").value;
  const category = document.getElementById("category").value;
  const sizes = document.getElementById("sizes").value;
  
  // Create comma separated colors list from variants for backward compatibility
  const colors = currentVariants.map(v => v.color).join(", ");
  const previewImg = document.getElementById("preview").src;

  if (!productId || !name || !price) {
    showToast("Please provide at least a Product ID, Name, and Price.");
    return;
  }

  const url = editingId 
    ? `${CONFIG.API_URL}/api/products/${editingId}`
    : `${CONFIG.API_URL}/api/products`;
  
  const method = editingId ? "PUT" : "POST";

  try {
    const res = await fetch(url, {
      method: method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": token
      },
      body: JSON.stringify({ 
        id: productId, name, price, original_price, description, 
        image: previewImg, stock: parseInt(stock), 
        category, sizes, colors, variants: currentVariants 
      })
    });

    if (res.ok) {
      showToast(editingId ? "Product updated successfully!" : "Product added successfully!");
      cancelEdit();
      loadProducts();
    } else {
      showToast("Operation failed. Try again.");
    }
  } catch (err) {
    console.error(err);
    showToast("Server error. Try again.");
  }
}

async function deleteProduct(id) {
  if (!confirm("Are you sure you want to delete this product?")) return;
  
  const token = localStorage.getItem("token");
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/products/${id}`, {
      method: "DELETE",
      headers: { "Authorization": token }
    });
    if (res.ok) {
      showToast("Product deleted safely.");
      loadProducts();
    }
  } catch (err) {
    console.error(err);
    showToast("Failed to delete product.");
  }
}

function renderAnalytics() {
  const canvas = document.getElementById("productChart");
  if (!canvas) return;

  if (chartInstance) chartInstance.destroy();

  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  const textColor = isDark ? "#94a3b8" : "#475569";
  const gridColor = isDark ? "rgba(255, 255, 255, 0.1)" : "rgba(0, 0, 0, 0.05)";

  chartInstance = new Chart(canvas, {
    type: "bar",
    data: {
      labels: products.map(p => p.name.length > 15 ? p.name.substring(0, 12) + '...' : p.name),
      datasets: [{ 
        label: "Current Stock", 
        data: products.map(p => p.stock),
        backgroundColor: "rgba(79, 70, 229, 0.6)",
        borderColor: "rgba(79, 70, 229, 1)",
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { 
          beginAtZero: true,
          grid: { color: gridColor },
          ticks: { color: textColor }
        },
        x: {
          grid: { display: false },
          ticks: { color: textColor }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}


loadProducts();
</script>

</body>
</html>
