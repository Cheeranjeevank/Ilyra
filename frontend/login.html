<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ILYRA</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center;">

<div class="overlay"></div>
<canvas id="particles"></canvas>

<div class="container" style="max-width: 400px; padding: 0;">
  <div class="card fade-in" style="padding: 2.5rem; box-shadow: var(--shadow-lg);">
    <div class="text-center mb-4">
      <h1 class="logo" style="font-size: 2.5rem; margin-bottom: 0.5rem;" onclick="location.href='user/index.html'">ILYRA</h1>
      <p style="color: var(--text-secondary); font-weight: 500;">Welcome back to premium style</p>
    </div>

    <div class="mb-4">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="name@example.com" required>
    </div>

    <div class="mb-4">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button class="btn mt-4" onclick="login()">Sign In</button>

    <div class="text-center mt-4" style="font-size: 0.9rem;">
      <span style="color: var(--text-secondary);">New to ILYRA?</span>
      <a href="register.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Create an account</a>
    </div>
  </div>
</div>

<script src="js/app.js?v=2"></script>
<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showToast("Please enter both email and password.");
    return;
  }

  try {
    const res = await fetch(`${CONFIG.API_URL}/api/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      
      if (data.user.role === "admin") {
        window.location.href = "admin/dashboard.html";
      } else {
        window.location.href = "user/index.html";
      }
    } else {
      showToast(data.message || "Invalid email or password.");
    }
  } catch (err) {
    console.error(err);
    showToast("Server error. Please try again later.");
  }
}
</script>

</body>
</html>
