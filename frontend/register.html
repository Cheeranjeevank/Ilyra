<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ILYRA</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center;">

<div class="overlay"></div>
<canvas id="particles"></canvas>

<div class="container" style="max-width: 450px; padding: 0;">
  <div class="card fade-in" style="padding: 2.5rem; box-shadow: var(--shadow-lg);">
    <div class="text-center mb-4">
      <h1 class="logo" style="font-size: 2.5rem; margin-bottom: 0.5rem;" onclick="location.href='user/index.html'">ILYRA</h1>
      <p style="color: var(--text-secondary); font-weight: 500;">Join our premium community</p>
    </div>

    <form id="registerForm">
      <div class="mb-4">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="mb-4">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>

      <div class="mb-4">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="mb-4">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
      </div>

      <button class="btn mt-4" type="submit">Create Account</button>
    </form>

    <div class="text-center mt-4" style="font-size: 0.9rem;">
      <span style="color: var(--text-secondary);">Already have an account?</span>
      <a href="login.html" style="color: var(--accent-color); font-weight: 600; text-decoration: none;">Sign In</a>
    </div>
  </div>
</div>

<script src="js/app.js?v=2"></script>
<script>
const form = document.getElementById("registerForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    showToast("Passwords do not match!");
    return;
  }

  try {
    const res = await fetch(`${CONFIG.API_URL}/api/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (data.success) {
      showToast("Registered successfully! Redirecting...");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    } else {
      showToast(data.message || "Registration failed. Try again.");
    }
  } catch (err) {
    console.error(err);
    showToast("Server error. Please try again later.");
  }
});
</script>

</body>
</html>
